<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BOOST Study Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0D1117;
      --surface:   #131C2E;
      --surface-2: #1A2440;
      --border:    #1E2C44;
      --teal:      #22C4D4;
      --teal-dim:  rgba(34, 196, 212, 0.12);
      --teal-glow: rgba(34, 196, 212, 0.18);
      --text-1:    #DDE4EF;
      --text-2:    #6B7A90;
      --font:      'DM Sans', Inter, -apple-system, sans-serif;
      --font-mono: 'DM Mono', 'Fira Code', ui-monospace, monospace;
    }

    html { color-scheme: dark; }

    body {
      background: var(--bg);
      font-family: var(--font);
      display: flex;
      flex-direction: column;
      align-items: stretch;
      min-height: 100vh;
      color: var(--text-1);
    }

    /* ─── Header ─────────────────────────────────────────────────────────── */
    .header {
      width: 100%;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      height: 52px;
      padding: 0 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    .badge {
      font-family: var(--font-mono);
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--teal);
      background: var(--teal-dim);
      border: 1px solid rgba(34, 196, 212, 0.25);
      padding: 3px 9px;
      border-radius: 4px;
    }

    .header-sep {
      width: 1px;
      height: 16px;
      background: var(--border);
    }

    .header-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-1);
      letter-spacing: -0.01em;
    }

    /* ─── Global dashboard nav ───────────────────────────────────────────── */
    .dash-nav {
      display: flex;
      gap: 2px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 3px;
    }

    .dash-tab {
      display: flex;
      align-items: center;
      gap: 7px;
      background: transparent;
      border: none;
      color: var(--text-2);
      font-size: 12.5px;
      font-weight: 500;
      font-family: var(--font);
      padding: 5px 16px;
      border-radius: 5px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      white-space: nowrap;
    }

    .dash-tab .tab-icon {
      display: flex;
      align-items: center;
      opacity: 0.7;
      transition: opacity 0.15s;
    }

    .dash-tab.active {
      background: var(--surface-2);
      color: var(--text-1);
    }

    .dash-tab.active .tab-icon { opacity: 1; }

    .dash-tab:hover:not(.active) {
      background: rgba(255, 255, 255, 0.04);
      color: var(--text-1);
    }

    /* ─── Export button ──────────────────────────────────────────────────── */
    #save-btn {
      background: transparent;
      color: var(--text-2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 14px;
      font-size: 12px;
      font-weight: 500;
      font-family: var(--font);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 7px;
      flex-shrink: 0;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
    }
    #save-btn svg { flex-shrink: 0; }
    #save-btn:hover {
      border-color: var(--teal);
      color: var(--teal);
      background: var(--teal-glow);
    }

    /* ─── Canvas area ────────────────────────────────────────────────────── */
    .main {
      flex: 1;
      padding: 24px 16px 56px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    #canvas-wrapper {
      overflow-x: auto;
      width: 100%;
      display: flex;
      justify-content: center;
    }

    #canvas {
      display: block;
      border-radius: 12px;
      box-shadow:
        0 0 0 1px var(--border),
        0 8px 48px rgba(0, 0, 0, 0.6),
        0 2px 12px rgba(0, 0, 0, 0.4);
    }

    /* ─── Zoom modal ─────────────────────────────────────────────────────── */
    #zoom-modal {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: rgba(0, 0, 0, 0.75);
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
    }
    #zoom-modal.active { display: flex; }

    .zoom-modal-inner {
      position: relative;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px;
      max-width: 92vw;
      max-height: 92vh;
      overflow: auto;
      overscroll-behavior: contain;
      box-shadow: 0 0 0 1px rgba(34,196,212,0.08), 0 32px 80px rgba(0,0,0,0.7);
    }

    #zoom-close {
      position: absolute;
      top: 10px; right: 10px;
      width: 28px; height: 28px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--surface-2);
      color: var(--text-2);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      z-index: 10;
      transition: border-color 0.15s, color 0.15s;
    }
    #zoom-close:hover { border-color: var(--teal); color: var(--teal); }

    #zoom-svg {
      display: block;
      max-width: none;
      max-height: none;
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="header-left">
      <span class="badge">BOOST Study</span>
      <div class="header-sep"></div>
      <span class="header-title">Dashboard</span>
    </div>

    <nav class="dash-nav" aria-label="Dashboard section">
      <button class="dash-tab active" data-dash="act">
        <span class="tab-icon">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="1,7 3.5,7 5,3 7,11 9,5 10.5,7 13,7"/>
          </svg>
        </span>
        Accelerometer
      </button>
      <button class="dash-tab" data-dash="hr">
        <span class="tab-icon">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M7 12C7 12 1.5 8 1.5 4.5a2.5 2.5 0 0 1 5-0.5 2.5 2.5 0 0 1 5 0.5C11.5 8 7 12 7 12z"/>
          </svg>
        </span>
        Heart Rate
      </button>
    </nav>

    <button id="save-btn">
      <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M6 1v7M3 5.5l3 3 3-3M1 10.5h10"/>
      </svg>
      Export SVG
    </button>
  </header>

  <div class="main">
    <div id="canvas-wrapper">
      <svg id="canvas" width="1440" height="1300" xmlns="http://www.w3.org/2000/svg">
        <text id="loading" x="720" y="650" text-anchor="middle" font-size="14" fill="#6B7A90" font-family="DM Mono, monospace">Loading data…</text>
      </svg>
    </div>
  </div>

  <div id="zoom-modal" role="dialog" aria-modal="true" aria-label="Plot detail view">
    <div class="zoom-modal-inner">
      <button id="zoom-close" title="Close (Esc)">✕</button>
      <svg id="zoom-svg" xmlns="http://www.w3.org/2000/svg"></svg>
    </div>
  </div>

  <script type="module" src="bundle.js"></script>
</body>
</html>
