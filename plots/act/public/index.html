<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Accelerometer Activity Plots — BOOST Study</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #0D1117;
      --surface:     #131C2E;
      --surface-2:   #1A2440;
      --border:      #1E2C44;
      --teal:        #22C4D4;
      --teal-glow:   rgba(34, 196, 212, 0.15);
      --text-1:      #DDE4EF;
      --text-2:      #6B7A90;
      --font:        'DM Sans', Inter, -apple-system, sans-serif;
      --font-mono:   'DM Mono', 'Fira Code', ui-monospace, monospace;
    }

    html { color-scheme: dark; }

    body {
      background: var(--bg);
      font-family: var(--font);
      display: flex;
      flex-direction: column;
      align-items: stretch;
      min-height: 100vh;
      color: var(--text-1);
    }

    /* ─── Header ─────────────────────────────────────────────────────────── */
    .header {
      width: 100%;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      height: 52px;
      padding: 0 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .badge {
      font-family: var(--font-mono);
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--teal);
      background: var(--teal-glow);
      border: 1px solid rgba(34, 196, 212, 0.3);
      padding: 3px 9px;
      border-radius: 4px;
    }

    .header-sep {
      width: 1px;
      height: 16px;
      background: var(--border);
    }

    .header-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-1);
      letter-spacing: -0.01em;
    }

    .header-subtitle {
      font-size: 12px;
      color: var(--text-2);
      font-weight: 400;
    }

    /* ─── Export button ──────────────────────────────────────────────────── */
    #save-btn {
      background: transparent;
      color: var(--text-2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 14px;
      font-size: 12.5px;
      font-weight: 500;
      font-family: var(--font);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 7px;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
    }

    #save-btn svg { flex-shrink: 0; }

    #save-btn:hover {
      border-color: var(--teal);
      color: var(--teal);
      background: var(--teal-glow);
    }

    /* ─── Main canvas area ───────────────────────────────────────────────── */
    .main {
      flex: 1;
      padding: 28px 16px 56px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    .canvas-meta {
      width: 1440px;
      max-width: 100%;
      display: flex;
      align-items: baseline;
      gap: 10px;
    }

    .canvas-meta-label {
      font-size: 11px;
      font-family: var(--font-mono);
      color: var(--text-2);
      letter-spacing: 0.04em;
    }

    .canvas-meta-dot {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: var(--border);
      flex-shrink: 0;
      align-self: center;
    }

    #canvas-wrapper {
      overflow-x: auto;
      width: 100%;
      display: flex;
      justify-content: center;
    }

    #canvas {
      display: block;
      border-radius: 12px;
      box-shadow:
        0 0 0 1px var(--border),
        0 8px 48px rgba(0, 0, 0, 0.6),
        0 2px 12px rgba(0, 0, 0, 0.4);
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="header-left">
      <span class="badge">BOOST Study</span>
      <div class="header-sep"></div>
      <span class="header-title">Accelerometer Activity</span>
      <span class="header-subtitle">Intervention &amp; Observational Cohorts</span>
    </div>
    <button id="save-btn">
      <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M6 1v7M3 5.5l3 3 3-3M1 10.5h10"/>
      </svg>
      Export SVG
    </button>
  </header>

  <div class="main">
    <div id="canvas-wrapper">
      <svg id="canvas" width="1440" height="1024" xmlns="http://www.w3.org/2000/svg">
        <text id="loading" x="720" y="512" text-anchor="middle" font-size="14" fill="#6B7A90" font-family="DM Mono, monospace">Loading data…</text>
      </svg>
    </div>
  </div>

  <script type="module" src="bundle.js"></script>
</body>
</html>
